<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>اختبار التكبير - الشموع اليابانية</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #fff;
            direction: rtl;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .title {
            font-size: 28px;
            font-weight: bold;
            color: #4CAF50;
            margin-bottom: 10px;
        }
        
        .zoom-controls {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        
        .zoom-btn {
            background: linear-gradient(135deg, #4CAF50 0%, #45a049 100%);
            border: none;
            color: white;
            padding: 12px 24px;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(76, 175, 80, 0.3);
            font-weight: bold;
        }
        
        .zoom-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(76, 175, 80, 0.4);
            background: linear-gradient(135deg, #45a049 0%, #4CAF50 100%);
        }
        
        .zoom-btn:active {
            transform: translateY(0);
            box-shadow: 0 2px 10px rgba(76, 175, 80, 0.2);
        }
        
        .reset-btn {
            background: linear-gradient(135deg, #FF9800 0%, #F57C00 100%);
            box-shadow: 0 4px 15px rgba(255, 152, 0, 0.3);
        }
        
        .reset-btn:hover {
            background: linear-gradient(135deg, #F57C00 0%, #FF9800 100%);
            box-shadow: 0 6px 20px rgba(255, 152, 0, 0.4);
        }
        
        .chart-container {
            position: relative;
            width: 100%;
            height: 600px;
            border: 3px solid #4CAF50;
            border-radius: 15px;
            overflow: hidden;
            background: #0a0a0a;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
        }
        
        #candleCanvas {
            width: 100%;
            height: 100%;
            cursor: crosshair;
            display: block;
        }
        
        .info-panel {
            position: absolute;
            bottom: 15px;
            left: 15px;
            background: rgba(0, 0, 0, 0.9);
            padding: 15px;
            border-radius: 10px;
            border: 2px solid #333;
            color: #fff;
            font-size: 14px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.7);
        }
        
        .zoom-level {
            position: absolute;
            top: 15px;
            left: 15px;
            background: rgba(76, 175, 80, 0.9);
            color: white;
            padding: 10px 15px;
            border-radius: 8px;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(76, 175, 80, 0.3);
        }
        
        .instructions {
            margin-top: 20px;
            text-align: center;
            color: #ccc;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="title">🔍 اختبار التكبير - الشموع اليابانية</div>
            <div>اختبار تفاعل التكبير والتصغير مع الرسم البياني</div>
        </div>
        
        <div class="zoom-controls">
            <button class="zoom-btn" onclick="zoomIn()">🔍 تكبير (+)</button>
            <button class="zoom-btn" onclick="zoomOut()">🔍 تصغير (-)</button>
            <button class="zoom-btn reset-btn" onclick="resetZoom()">🔄 إعادة تعيين</button>
        </div>
        
        <div class="chart-container">
            <canvas id="candleCanvas" width="1200" height="600"></canvas>
            <div class="zoom-level" id="zoomLevel">التكبير: 1.0x</div>
            <div class="info-panel">
                <div>📈 عدد الشموع: <span id="candleCount">50</span></div>
                <div>🎯 استخدم الأزرار أو عجلة الماوس للتكبير</div>
                <div>⌨️ اختصارات: + للتكبير، - للتصغير، R للإعادة</div>
            </div>
        </div>
        
        <div class="instructions">
            💡 يمكنك استخدام عجلة الماوس للتكبير والتصغير، أو الأزرار أعلاه
        </div>
    </div>

    <script>
        let zoomLevel = 1.0;
        let panX = 0;
        let candleData = [];
        
        // إنشاء بيانات تجريبية للشموع
        function generateDemoData() {
            const data = [];
            let price = 11000;
            const startDate = new Date('2024-01-01');
            
            for (let i = 0; i < 50; i++) {
                const change = (Math.random() - 0.5) * 200;
                const open = price;
                const close = open + change;
                const high = Math.max(open, close) + Math.random() * 50;
                const low = Math.min(open, close) - Math.random() * 50;
                
                data.push({
                    date: new Date(startDate.getTime() + i * 24 * 60 * 60 * 1000),
                    open: open,
                    high: high,
                    low: low,
                    close: close
                });
                
                price = close;
            }
            
            return data;
        }
        
        // رسم الشموع مع التكبير
        function drawCandlesticks() {
            const canvas = document.getElementById('candleCanvas');
            const ctx = canvas.getContext('2d');
            
            // مسح Canvas
            ctx.fillStyle = '#0a0a0a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            if (candleData.length === 0) return;
            
            // حفظ السياق وتطبيق التكبير
            ctx.save();
            ctx.scale(zoomLevel, zoomLevel);
            ctx.translate(panX / zoomLevel, 0);
            
            // إعدادات الرسم
            const padding = 50;
            const chartWidth = (canvas.width - 2 * padding) / zoomLevel;
            const chartHeight = (canvas.height - 2 * padding) / zoomLevel;
            const candleWidth = chartWidth / candleData.length * 0.8;
            const candleGap = chartWidth / candleData.length * 0.2;
            
            // حساب أعلى وأقل سعر
            const prices = candleData.flatMap(d => [d.high, d.low]);
            const maxPrice = Math.max(...prices);
            const minPrice = Math.min(...prices);
            const priceRange = maxPrice - minPrice;
            
            // رسم خطوط الشبكة
            ctx.strokeStyle = '#333';
            ctx.lineWidth = 1 / zoomLevel;
            
            for (let i = 0; i <= 5; i++) {
                const y = (padding + (chartHeight / 5) * i) / zoomLevel;
                const price = maxPrice - (priceRange / 5) * i;
                
                ctx.beginPath();
                ctx.moveTo(padding / zoomLevel, y);
                ctx.lineTo((canvas.width - padding) / zoomLevel, y);
                ctx.stroke();
                
                // تسميات الأسعار
                ctx.fillStyle = '#ccc';
                ctx.font = `${12 / zoomLevel}px Arial`;
                ctx.textAlign = 'right';
                ctx.fillText(price.toFixed(0), (padding - 10) / zoomLevel, y + 4/zoomLevel);
            }
            
            // رسم الشموع
            candleData.forEach((candle, index) => {
                const x = (padding + index * (candleWidth + candleGap)) / zoomLevel;
                
                // تحويل الأسعار إلى إحداثيات Y
                const openY = (padding + (maxPrice - candle.open) / priceRange * chartHeight) / zoomLevel;
                const closeY = (padding + (maxPrice - candle.close) / priceRange * chartHeight) / zoomLevel;
                const highY = (padding + (maxPrice - candle.high) / priceRange * chartHeight) / zoomLevel;
                const lowY = (padding + (maxPrice - candle.low) / priceRange * chartHeight) / zoomLevel;
                
                // تحديد لون الشمعة
                const isGreen = candle.close > candle.open;
                const candleColor = isGreen ? '#4CAF50' : '#f44336';
                const wickColor = isGreen ? '#2E7D32' : '#C62828';
                
                // رسم الفتيل
                ctx.strokeStyle = wickColor;
                ctx.lineWidth = 2 / zoomLevel;
                ctx.beginPath();
                ctx.moveTo(x + (candleWidth / zoomLevel) / 2, highY);
                ctx.lineTo(x + (candleWidth / zoomLevel) / 2, lowY);
                ctx.stroke();
                
                // رسم جسم الشمعة
                ctx.fillStyle = candleColor;
                const bodyTop = Math.min(openY, closeY);
                const bodyHeight = Math.abs(closeY - openY) || (2 / zoomLevel);
                
                ctx.fillRect(x, bodyTop, candleWidth / zoomLevel, bodyHeight);
                
                // إضافة حدود
                ctx.strokeStyle = wickColor;
                ctx.lineWidth = 1 / zoomLevel;
                ctx.strokeRect(x, bodyTop, candleWidth / zoomLevel, bodyHeight);
            });
            
            // عنوان الرسم البياني
            ctx.fillStyle = '#fff';
            ctx.font = `bold ${16 / zoomLevel}px Arial`;
            ctx.textAlign = 'center';
            ctx.fillText('📊 الشموع اليابانية - اختبار التكبير', (canvas.width / 2) / zoomLevel, 30 / zoomLevel);
            
            // استعادة السياق
            ctx.restore();
            
            // تحديث مستوى التكبير
            document.getElementById('zoomLevel').textContent = `التكبير: ${zoomLevel.toFixed(1)}x`;
        }
        
        // وظائف التكبير
        function zoomIn() {
            if (zoomLevel < 5.0) {
                zoomLevel += 0.2;
                drawCandlesticks();
            }
        }
        
        function zoomOut() {
            if (zoomLevel > 0.5) {
                zoomLevel -= 0.2;
                drawCandlesticks();
            }
        }
        
        function resetZoom() {
            zoomLevel = 1.0;
            panX = 0;
            drawCandlesticks();
        }
        
        // مستمع عجلة الماوس
        document.getElementById('candleCanvas').addEventListener('wheel', function(e) {
            e.preventDefault();
            
            if (e.deltaY < 0) {
                zoomIn();
            } else {
                zoomOut();
            }
        });
        
        // اختصارات لوحة المفاتيح
        document.addEventListener('keydown', function(e) {
            switch(e.key) {
                case '+':
                case '=':
                    zoomIn();
                    break;
                case '-':
                    zoomOut();
                    break;
                case 'r':
                case 'R':
                    resetZoom();
                    break;
            }
        });
        
        // تهيئة البيانات والرسم
        candleData = generateDemoData();
        drawCandlesticks();
        
        console.log('🎯 اختبار التكبير جاهز!');
        console.log('📈 البيانات:', candleData.length, 'شمعة');
        console.log('🔍 التكبير الحالي:', zoomLevel + 'x');
    </script>
</body>
</html>
